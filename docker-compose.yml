services:

   training:
     build: ./training
     volumes:
       - ./data:/data
       - model_artifacts:/model

   api:
     build: ./api
     ports:
       - "5000:5000"
     depends_on:
       training:
         condition: service_completed_successfully
     volumes:
       - model_artifacts:/model
     healthcheck:
       test: [ "CMD", "curl", "-f", "http://localhost:5000/health" ]
       interval: 5s
       timeout: 3s
       retries: 5

   streamlit:
     build: ./streamlit
     ports:
       - "8501:8501"
     depends_on:
       training:
         condition: service_completed_successfully
       api:
         condition: service_healthy
     volumes:
       - model_artifacts:/model
       - ./data:/data

volumes:
  model_artifacts:
